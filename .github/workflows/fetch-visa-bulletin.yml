name: Fetch Visa Bulletin Data

on:
  schedule:
    - cron: '0 8 * * *'   # Daily 8AM UTC (1hr after news fetch, avoid runner contention)
  workflow_dispatch:        # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install poppler-utils (pdftotext)
        run: sudo apt-get update -y && sudo apt-get install -y poppler-utils

      - name: Fetch visa bulletin data
        run: python scripts/fetch-visa-bulletin.py

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler (pinned, for KV write only)
        run: npm install --no-save wrangler@4.103.0

      - name: Write to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler kv key put --binding=VISA_BULLETIN "visa-bulletin-data" "$(cat data/visa-bulletin.json)" --remote -c wrangler.staging.jsonc

      - name: Trigger VB email alerts
        env:
          VB_ALERT_SECRET: ${{ secrets.VB_ALERT_SECRET }}
        run: |
          curl -s -X POST "https://eb3viet.com/api/send-vb-alert" \
            -H "Authorization: Bearer $VB_ALERT_SECRET" \
            -H "Content-Type: application/json" \
            -H "User-Agent: eb3viet-github-actions/1.0" \
            --fail-with-body || true
