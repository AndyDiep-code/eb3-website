- name: "spec-forge"
  path: "spec-forge/SKILL.md"
  description: "Use this skill whenever a user wants to turn raw client requirements into structured engineering artifacts. Trigger on: \"ingest requirements\", \"write a spec\", \"break this into stories\", \"turn this into a backlog\", \"we got a new BRD\", \"client sent us a transcript\", \"update the spec\", \"create user stories\", \"product specification\", \"requirements document\", or any request involving raw client documents (PDFs, transcripts, chat exports, BRDs, meeting notes) and structured engineering output. Also trigger when the user drops files into a spec/inbox/ folder and asks what to do with them, or when they want to maintain/update an existing spec with new information. This skill handles the full pipeline: ingest → analyze → synthesize spec → generate interactive HTML → produce ordered backlog.\n"
  category: "other"
  has_scripts: true
  has_references: true
  argument_hint: "[source material or file path] [--update to add to existing spec without rewriting] [--phase INGEST|ANALYZE|SPEC|HTML|BACKLOG to run a specific phase only]"
  keywords: ["requirements", "specification", "backlog", "user stories", "BRD", "product spec", "ingest requirements", "feature breakdown", "epics", "acceptance criteria", "traceability", "product documentation", "sprint planning", "engineering artifacts"]
